version: 1.2.8
cache: true

# ----------------------------------------------------------------------------
# Lancya — configuration LibreChat
# Inference: Infomaniak AI (Suisse), API compatible OpenAI
# product_id: 109317
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# Credits par utilisateur (protege la marge / usage equitable).
# 1 credit ~= 1 token consomme (entree + sortie).
# Reperes de cout Infomaniak : ~0.50 CHF / M tokens entree, ~1.50 CHF / M sortie.
# Ajuste refillAmount selon le budget mensuel que tu acceptes par utilisateur.
# ----------------------------------------------------------------------------
balance:
  enabled: true
  startBalance: 1000000         # tier gratuit : ~1 M credits offerts une fois a l'inscription
  autoRefillEnabled: false      # pas de recharge auto : le gratuit s'epuise (-> upgrade),
                                # et le bridge Stripe gere les recharges des abonnes payants

interface:
  customWelcome: "Bienvenue sur Lancya, {{user.name}}. Votre IA pense en Suisse."
  customFooter: "Lancya · IA souveraine, hébergée en Suisse"
  # On masque les reglages avances pour eviter la paralysie du choix
  parameters: false
  presets: false

# ----------------------------------------------------------------------------
# Memoire utilisateur (contexte retenu d'une conversation a l'autre).
# Le traitement memoire utilise le Ministral (souverain, bon marche).
# ----------------------------------------------------------------------------
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 5
  agent:
    provider: "Lancya"
    model: "mistralai/Ministral-3-14B-Instruct-2512"

# ----------------------------------------------------------------------------
# Recherche web souveraine via SearXNG auto-heberge (sur Railway).
# Pas de scraper ni de reranker externe : tout reste dans notre infra.
# ----------------------------------------------------------------------------
webSearch:
  searchProvider: "searxng"
  scraperProvider: "firecrawl"
  rerankerType: "none"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  safeSearch: 1

# modelSpecs = la liste curatee des modeles Lancya.
# enforce: true masque TOUS les autres endpoints (OpenAI, Anthropic, Google, My Agents).
# Seuls les modeles ci-dessous sont selectionnables.
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "standard"
      label: "Lancya"
      default: true
      description: "Rapide, intelligent et agentique : recherche web, documents et outils, automatiquement. Recommande par defaut."
      artifacts: true
      webSearch: true
      preset:
        endpoint: "Lancya"
        model: "moonshotai/Kimi-K2.6"
    - name: "suisse"
      label: "Lancya Suisse"
      description: "Le modele 100% suisse (Apertus). Pour le chat et la confidentialite maximale."
      artifacts: true
      preset:
        endpoint: "Lancya"
        model: "swiss-ai/Apertus-70B-Instruct-2509"

endpoints:
  custom:
    - name: 'Lancya'
      apiKey: '${INFOMANIAK_API_KEY}'
      baseURL: 'https://api.infomaniak.com/2/ai/${PRODUCT_ID}/openai/v1'
      models:
        default:
          - 'mistralai/Mistral-Small-4-119B-2603'
          - 'moonshotai/Kimi-K2.6'
          - 'swiss-ai/Apertus-70B-Instruct-2509'
          - 'mistralai/Ministral-3-14B-Instruct-2512'
          - 'Qwen/Qwen3.5-397B-A17B-FP8'
        fetch: false
      titleConvo: true
      # Modele bon marche pour generer les titres de conversation (protege la marge)
      titleModel: 'mistralai/Ministral-3-14B-Instruct-2512'
      modelDisplayLabel: 'Lancya'
