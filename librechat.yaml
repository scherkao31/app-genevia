version: 1.2.8
cache: true

# Stockage des fichiers sur l'Object Storage Infomaniak (S3, Suisse, souverain).
# Les cles et l'endpoint sont dans les variables d'environnement Railway (AWS_*).
fileStrategy: s3

# ----------------------------------------------------------------------------
# Lancya — configuration LibreChat
# Inference: Infomaniak AI (Suisse), API compatible OpenAI
# product_id: 109317
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# Credits par utilisateur (protege la marge / usage equitable).
# 1 credit ~= 1 token consomme (entree + sortie).
# Reperes de cout Infomaniak : ~0.50 CHF / M tokens entree, ~1.50 CHF / M sortie.
# Ajuste refillAmount selon le budget mensuel que tu acceptes par utilisateur.
# ----------------------------------------------------------------------------
balance:
  enabled: true
  startBalance: 1000000         # tier gratuit : ~1 M credits offerts une fois a l'inscription
  autoRefillEnabled: false      # pas de recharge auto : le gratuit s'epuise (-> upgrade),
                                # et le bridge Stripe gere les recharges des abonnes payants

interface:
  customWelcome: "Bienvenue sur Lancya, {{user.name}}. Votre IA pense en Suisse."
  customFooter: "Lancya · IA et fichiers hébergés en Suisse"
  # Liens legaux (pages servies par le fork : /confidentialite et /conditions)
  privacyPolicy:
    externalUrl: "https://www.lancya.ch/confidentialite"
    openNewTab: true
  termsOfService:
    externalUrl: "https://www.lancya.ch/conditions"
    openNewTab: true
  # Bouton "Aide & FAQ" du menu compte -> notre page FAQ (servie par le fork : /aide)
  helpAndFaqURL: "https://www.lancya.ch/aide"
  # On masque les reglages avances pour eviter la paralysie du choix
  parameters: false
  presets: false
  # Skills actifs par defaut pour les utilisateurs (les skills synchronises depuis le repo
  # sont partages par le systeme : defaultActiveOnShare les rend actifs sans action manuelle)
  skills:
    use: true
    create: true
    defaultActiveOnShare: true

# ----------------------------------------------------------------------------
# Memoire utilisateur (contexte retenu d'une conversation a l'autre).
# Le traitement memoire utilise le Ministral (souverain, bon marche).
# ----------------------------------------------------------------------------
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 5
  agent:
    enabled: true
    provider: "Lancya"
    # Kimi : le SEUL modele dont on a confirme l'appel d'outils via Infomaniak (les skills
    # tournent dessus). On l'utilise pour ISOLER le probleme : si la memoire se remplit avec Kimi,
    # c'est que les modeles Mistral n'exposent pas les outils sur Infomaniak. Cout : seulement une
    # petite fenetre (5 messages) par tour ; a arbitrer ensuite (garder sur Kimi vs desactiver).
    model: "moonshotai/Kimi-K2.6"
    # Instructions PROACTIVES : surcharge le prompt par defaut de LibreChat (qui ne retient
    # QUE sur demande explicite). Ici l'agent capte de lui-meme les infos durables et utiles,
    # avec des garde-fous de confidentialite stricts (audience au secret professionnel).
    instructions: |
      Tu es l'agent memoire de Lancya. Ton role : entretenir une memoire courte, utile et
      durable sur l'utilisateur, pour personnaliser les reponses, sans jamais stocker
      d'information sensible ou inutile.

      Utilise le tool set_memory de facon PROACTIVE (sans attendre que l'utilisateur le demande)
      quand tu reperes une information DURABLE et utile a long terme, par exemple :
      - son metier, son role, son secteur, sa region ou son canton ;
      - ses preferences de travail : langue, ton, niveau de detail, format attendu ;
      - le type de taches recurrentes qu'il fait avec Lancya ;
      - des elements de contexte stables sur son activite ou son entreprise.

      Ne stocke JAMAIS :
      - des donnees sensibles (sante, donnees de clients ou de tiers, secret professionnel,
        mots de passe, numeros de carte, identifiants) ;
      - le contenu ponctuel d'un document ou d'une question du jour (ephemere) ;
      - des montants ou des chiffres financiers precis.

      Garde chaque souvenir court et factuel. Mets a jour un souvenir existant avec set_memory
      plutot que de creer un doublon. Si tu n'as rien de durable et utile a retenir, ne fais rien.
      En cas de doute sur le caractere sensible d'une information, ne la stocke pas.

# ----------------------------------------------------------------------------
# Recherche web souveraine via SearXNG auto-heberge (sur Railway).
# Pas de scraper ni de reranker externe : tout reste dans notre infra.
# ----------------------------------------------------------------------------
webSearch:
  searchProvider: "searxng"
  scraperProvider: "firecrawl"
  rerankerType: "none"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  safeSearch: 1

# ----------------------------------------------------------------------------
# Synchronisation des skills depuis le depot GitHub scherkao31/lancya-skills.
# Pour ajouter / importer / modifier une skill : pousser sur ce repo (pas de rebuild).
# Les skills sont dans skills/<nom>/SKILL.md. Repo public -> pas de token requis.
# ----------------------------------------------------------------------------
skillSync:
  github:
    enabled: true
    runOnStartup: true
    intervalMinutes: 60
    sources:
      - id: lancya
        owner: scherkao31
        repo: lancya-skills
        ref: main
        paths:
          - skills
        skillDiscoveryDepth: 2
        token: "${GITHUB_SKILLS_TOKEN}"

# modelSpecs = la liste curatee des modeles Lancya.
# enforce: true masque TOUS les autres endpoints (OpenAI, Anthropic, Google, My Agents).
# Seuls les modeles ci-dessous sont selectionnables.
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "standard"
      label: "Lancya"
      iconURL: "/assets/lancya-model.svg"
      default: true
      description: "Kimi K2.6, hébergé sur les serveurs Infomaniak en Suisse. Rapide, intelligent et agentique : recherche web, documents et outils, automatiquement. Recommandé par défaut."
      artifacts: true
      webSearch: true
      fileSearch: true
      skills: true
      executeCode: true
      # Masque la rangee de pastilles (web/code/fichiers/artefacts) sous l'input pour une
      # interface plus epuree. Les capacites restent ACTIVES par defaut (champs ci-dessus),
      # elles s'enclenchent automatiquement ; on retire juste l'encombrement visuel.
      hideBadgeRow: true
      # Pas d'icone de modele dans le menu deroulant (choix produit Lancya).
      showIconInMenu: false
      preset:
        endpoint: "Lancya"
        model: "moonshotai/Kimi-K2.6"
        # Nom de l'assistant affiche dans la discussion (sinon l'app derive "Moonshot" du modele).
        modelLabel: "Lancya"
        promptPrefix: |
          Tu es l'assistant de Lancya. Reponds toujours dans la langue de l'utilisateur (souvent le francais). Ecris comme un professionnel humain : clair, direct, naturel.

          Regles de style (a respecter strictement, car elles distinguent Lancya des outils qui "sentent l'IA") :
          - N'utilise JAMAIS de tiret cadratin (—) ni demi-cadratin (–). A la place : virgule, parentheses, deux-points, ou deux phrases separees.
          - Evite le vocabulaire qui trahit l'IA : "plonger dans", "paysage", "voyage", "a l'ere de", "dans un monde ou", "il convient de noter", "il est important de noter", "en somme", "indeniable", "riche", "robuste", "transformateur", "souligner", "mettre en lumiere".
          - N'abuse pas des connecteurs "De plus / Par ailleurs / En outre / En conclusion". Varie-les ou supprime-les.
          - Evite les tics de structure : la regle de trois systematique (adjectif, adjectif, adjectif), les formules "non seulement X mais aussi Y" et "ce n'est pas X, c'est Y", et les conclusions du type "Malgre ses forces...".
          - Pas de gras mecanique sur des mots-cles, pas d'emojis decoratifs, pas de titres avec une Majuscule A Chaque Mot.
          - Varie la longueur des phrases. Va droit au but, n'enrobe pas. Pas de flatterie ni de meta-commentaire ("Bien sur !", "Excellente question !"). Pas de disclaimer inutile.

          Sois utile, precis et concis.

          Reponses suggerees (widget de choix cliquables) :
          Tu peux, A LA FIN de ta reponse, proposer des reponses cliquables en ajoutant un bloc de code dont le langage est exactement "lancya_choices", contenant un JSON valide et complet :
          ```lancya_choices
          { "question": "Texte court optionnel", "choices": ["Premiere option", "Deuxieme option", "Troisieme option"] }
          ```
          Quand l'utilisateur clique une option, son libelle est envoye comme son prochain message. Regles d'usage (importantes, sinon ca devient du fouillis) :
          - Utilise ce bloc UNIQUEMENT quand la suite logique tient en un petit nombre de choix discrets et que les proposer fait gagner du temps a l'utilisateur. Par exemple : une question de clarification avec quelques reponses probables, le choix d'un canton, d'un type de document, d'un ton, ou la prochaine action a faire apres une tache.
          - N'en mets PAS quand la reponse attendue est libre ou nuancee, quand il n'y a qu'un seul chemin evident, ou juste pour meubler. Mieux vaut zero bloc que des choix inutiles.
          - Au maximum un seul bloc par reponse, 2 a 5 options, libelles courts (quelques mots).
          - Choix UNIQUE par defaut (un clic = envoi). Si l'utilisateur peut legitimement en retenir PLUSIEURS a la fois (par exemple "quels types de documents voulez-vous ?"), ajoute "multiple": true : l'interface affiche alors des cases a cocher et un bouton d'envoi.
            ```lancya_choices
            { "question": "Quels documents preparer ?", "multiple": true, "choices": ["Contrat de travail", "Fiche de paie", "Attestation", "Certificat de travail"] }
            ```
          - Le bloc vient toujours en dernier, apres ton texte normal. Le JSON doit etre strictement valide : pas de commentaire, pas de texte apres le bloc, des guillemets droits.

          Textes a copier (bloc "lancya_variants") :
          Des que tu produis un texte que l'utilisateur va vouloir copier et reutiliser tel quel (email, courrier, message, annonce, description, publication reseaux, modele de document, post...), mets-le dans un bloc dont le langage est exactement "lancya_variants", meme s'il n'y a qu'une seule version. L'interface l'affiche dans une carte avec un bouton "Copier". Pour un email, ajoute en plus une premiere ligne "Objet : ..." : un bouton "Ouvrir dans ma messagerie" apparait alors (il ouvre le client mail de l'utilisateur, objet et corps pre-remplis). N'utilise PAS ce bloc pour une simple reponse conversationnelle, une explication ou une analyse : seulement pour un livrable que l'on copie.
          Comme les corps sont longs et multi-lignes, on N'UTILISE PAS de JSON ici : chaque version commence par une ligne "[[ Libelle court ]]" suivie du texte complet de la version.
          ```lancya_variants
          [[ Courte et directe ]]
          Objet : Relance facture nº ...

          Bonjour ...,
          ...

          [[ Cordiale ]]
          Objet : ...

          Bonjour ...,
          ...
          ```
          Regles : un texte simple = une seule section "[[ ... ]]" (pas d'onglet affiche). Propose 2 ou 3 versions UNIQUEMENT quand des tons ou des longueurs reellement differents valent la peine d'etre compares ; sinon une seule version. Libelles courts. Pour un email, garde la ligne "Objet : ..." en tete (inutile pour les autres textes).
          Champs a completer : NE mets PAS de champs entre crochets par reflexe. Si l'utilisateur t'a deja donne l'information (nom, date, montant, numero...), ECRIS-LA directement dans le texte. Utilise un champ [entre crochets] UNIQUEMENT pour une information reellement manquante ou variable que tu ne peux pas connaitre. Le plus souvent, un texte n'a aucun champ : c'est tres bien. Quand tu en mets, donne-leur un nom EXPLICITE et lisible (par exemple [numero de facture], [date d'echeance], [nom du client]) et jamais de [XXX] ou [...] vagues ; l'interface en fait des cases a remplir, le nom entre crochets devient le libelle. Reutilise exactement le meme libelle si le champ revient plusieurs fois.
    - name: "suisse"
      label: "Apertus"
      iconURL: "/assets/lancya-model.svg"
      hideBadgeRow: true
      # Pas d'icone de modele dans le menu deroulant (choix produit Lancya).
      showIconInMenu: false
      description: "Le modèle suisse Apertus, hébergé sur les serveurs Infomaniak. Plus modeste et moins puissant que le modèle principal, mais parfait pour un échange rapide ; il reflète ce que la Suisse propose aujourd'hui."
      artifacts: true
      preset:
        endpoint: "Lancya"
        model: "swiss-ai/Apertus-70B-Instruct-2509"
        modelLabel: "Apertus"

endpoints:
  # Agents : ne proposer que le fournisseur Lancya dans le constructeur (masque OpenAI/Google).
  agents:
    allowedProviders:
      - "Lancya"
  custom:
    - name: 'Lancya'
      apiKey: '${INFOMANIAK_API_KEY}'
      baseURL: 'https://api.infomaniak.com/2/ai/${PRODUCT_ID}/openai/v1'
      models:
        # Liste volontairement reduite a Kimi : c'est elle qui alimente le selecteur de modele
        # du CONSTRUCTEUR D'AGENT (on ne veut que Kimi pour les agents, le modele agentique).
        # Le chat normal n'utilise PAS cette liste (il passe par les modelSpecs verrouilles),
        # donc le spec "suisse" (Apertus), le titre (Ministral) et la memoire continuent de marcher.
        default:
          - 'moonshotai/Kimi-K2.6'
        fetch: false
      titleConvo: true
      # Titrage : completion + Gemma 4-31B (google/gemma-4-31B-it). Choisi car c'est un
      # modele INSTRUCT NON-RAISONNANT : aucun raisonnement ne peut fuiter dans le titre
      # (c'est ce qui nous a brule avec Ministral), il est competent pour une tache
      # simple, et c'est le moins cher des modeles serieux (0.20/0.40 par M ; un titre
      # coute des fractions de centime). NE JAMAIS mettre d'EXEMPLE de sujet dans le
      # prompt : le modele le recopie comme titre au lieu de lire la conversation.
      titleModel: 'google/gemma-4-31B-it'
      titleMethod: 'completion'
      titlePrompt: |
        Donne un titre tres court (3 a 6 mots) au sujet de la conversation ci-dessus, dans la langue de l'utilisateur (souvent le francais).
        Titre le CONTENU reel dont parle l'utilisateur, pas le format de la demande : si l'utilisateur ecrit "fais un slide sur Robert", le titre porte sur Robert, pas sur les slides ni sur l'IA.
        N'invente aucun sujet et ne recopie pas ces consignes. Reponds uniquement par le titre : pas de guillemets, pas de markdown, pas de ponctuation finale.
      modelDisplayLabel: 'Lancya'
