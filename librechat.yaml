version: 1.2.8
cache: true

# ----------------------------------------------------------------------------
# Lancya — configuration LibreChat
# Inference: Infomaniak AI (Suisse), API compatible OpenAI
# product_id: 109317
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# Credits par utilisateur (protege la marge / usage equitable).
# 1 credit ~= 1 token consomme (entree + sortie).
# Reperes de cout Infomaniak : ~0.50 CHF / M tokens entree, ~1.50 CHF / M sortie.
# Ajuste refillAmount selon le budget mensuel que tu acceptes par utilisateur.
# ----------------------------------------------------------------------------
balance:
  enabled: true
  startBalance: 1000000         # tier gratuit : ~1 M credits offerts une fois a l'inscription
  autoRefillEnabled: false      # pas de recharge auto : le gratuit s'epuise (-> upgrade),
                                # et le bridge Stripe gere les recharges des abonnes payants

interface:
  customWelcome: "Bienvenue sur Lancya, {{user.name}}. Votre IA pense en Suisse."
  customFooter: "Lancya · IA souveraine, hébergée en Suisse"
  # On masque les reglages avances pour eviter la paralysie du choix
  parameters: false
  presets: false
  # Skills actifs par defaut pour les utilisateurs (les skills synchronises depuis le repo
  # sont partages par le systeme : defaultActiveOnShare les rend actifs sans action manuelle)
  skills:
    use: true
    create: true
    defaultActiveOnShare: true

# ----------------------------------------------------------------------------
# Memoire utilisateur (contexte retenu d'une conversation a l'autre).
# Le traitement memoire utilise le Ministral (souverain, bon marche).
# ----------------------------------------------------------------------------
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 5
  agent:
    enabled: true
    provider: "Lancya"
    model: "mistralai/Ministral-3-14B-Instruct-2512"

# ----------------------------------------------------------------------------
# Recherche web souveraine via SearXNG auto-heberge (sur Railway).
# Pas de scraper ni de reranker externe : tout reste dans notre infra.
# ----------------------------------------------------------------------------
webSearch:
  searchProvider: "searxng"
  scraperProvider: "firecrawl"
  rerankerType: "none"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  safeSearch: 1

# ----------------------------------------------------------------------------
# Synchronisation des skills depuis le depot GitHub scherkao31/lancya-skills.
# Pour ajouter / importer / modifier une skill : pousser sur ce repo (pas de rebuild).
# Les skills sont dans skills/<nom>/SKILL.md. Repo public -> pas de token requis.
# ----------------------------------------------------------------------------
skillSync:
  github:
    enabled: true
    runOnStartup: true
    intervalMinutes: 60
    sources:
      - id: lancya
        owner: scherkao31
        repo: lancya-skills
        ref: main
        paths:
          - skills
        skillDiscoveryDepth: 2

# modelSpecs = la liste curatee des modeles Lancya.
# enforce: true masque TOUS les autres endpoints (OpenAI, Anthropic, Google, My Agents).
# Seuls les modeles ci-dessous sont selectionnables.
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "standard"
      label: "Lancya"
      default: true
      description: "Rapide, intelligent et agentique : recherche web, documents et outils, automatiquement. Recommande par defaut."
      artifacts: true
      webSearch: true
      fileSearch: true
      skills: true
      preset:
        endpoint: "Lancya"
        model: "moonshotai/Kimi-K2.6"
        promptPrefix: |
          Tu es l'assistant de Lancya. Reponds toujours dans la langue de l'utilisateur (souvent le francais). Ecris comme un professionnel humain : clair, direct, naturel.

          Regles de style (a respecter strictement, car elles distinguent Lancya des outils qui "sentent l'IA") :
          - N'utilise JAMAIS de tiret cadratin (—) ni demi-cadratin (–). A la place : virgule, parentheses, deux-points, ou deux phrases separees.
          - Evite le vocabulaire qui trahit l'IA : "plonger dans", "paysage", "voyage", "a l'ere de", "dans un monde ou", "il convient de noter", "il est important de noter", "en somme", "indeniable", "riche", "robuste", "transformateur", "souligner", "mettre en lumiere".
          - N'abuse pas des connecteurs "De plus / Par ailleurs / En outre / En conclusion". Varie-les ou supprime-les.
          - Evite les tics de structure : la regle de trois systematique (adjectif, adjectif, adjectif), les formules "non seulement X mais aussi Y" et "ce n'est pas X, c'est Y", et les conclusions du type "Malgre ses forces...".
          - Pas de gras mecanique sur des mots-cles, pas d'emojis decoratifs, pas de titres avec une Majuscule A Chaque Mot.
          - Varie la longueur des phrases. Va droit au but, n'enrobe pas. Pas de flatterie ni de meta-commentaire ("Bien sur !", "Excellente question !"). Pas de disclaimer inutile.

          Sois utile, precis et concis.
    - name: "suisse"
      label: "Lancya Suisse"
      description: "Le modele 100% suisse (Apertus). Pour le chat et la confidentialite maximale."
      artifacts: true
      preset:
        endpoint: "Lancya"
        model: "swiss-ai/Apertus-70B-Instruct-2509"

endpoints:
  custom:
    - name: 'Lancya'
      apiKey: '${INFOMANIAK_API_KEY}'
      baseURL: 'https://api.infomaniak.com/2/ai/${PRODUCT_ID}/openai/v1'
      models:
        default:
          - 'mistralai/Mistral-Small-4-119B-2603'
          - 'moonshotai/Kimi-K2.6'
          - 'swiss-ai/Apertus-70B-Instruct-2509'
          - 'mistralai/Ministral-3-14B-Instruct-2512'
          - 'Qwen/Qwen3.5-397B-A17B-FP8'
        fetch: false
      titleConvo: true
      # Modele bon marche pour generer les titres de conversation (protege la marge)
      titleModel: 'mistralai/Ministral-3-14B-Instruct-2512'
      modelDisplayLabel: 'Lancya'
